<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador de Documentos — PGM Extrema</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1923;color:#f0ece3;min-height:100vh}
.hdr{background:#12202f;border-bottom:2px solid #c9a84c;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:18px;font-weight:800;color:#c9a84c}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.hdr-back{background:rgba(201,168,76,.15);color:#c9a84c;border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none}
.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:220px;min-width:220px;background:#12202f;border-right:1px solid rgba(255,255,255,.06);padding:16px;display:flex;flex-direction:column;gap:6px}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.35);font-weight:700;margin-bottom:6px}
.sbtn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px 13px;cursor:pointer;text-align:left;color:#f0ece3;width:100%;transition:all .15s}
.sbtn:hover{border-color:rgba(201,168,76,.4);background:#1a2535}
.sbtn.on{border-color:#c9a84c;background:#1f2e42}
.sbtn-n{font-size:12px;font-weight:600}
.sbtn-d{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.main{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;max-width:860px}
.card{background:#1a2535;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:20px}
.card-t{font-size:12px;font-weight:700;color:#c9a84c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gf{grid-column:1/-1}
.fl label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.45);font-weight:600;display:block;margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:8px 11px;color:#f0ece3;font-size:12px;font-family:inherit;outline:none}
.fl input:focus,.fl textarea:focus,.fl select:focus{border-color:#c9a84c}
.fl textarea{resize:vertical}
.fl select option{background:#1a2535}
.srv{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.srv-t{font-size:10px;color:#c9a84c;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.srv-rm{position:absolute;top:8px;right:8px;background:rgba(224,92,92,.15);border:1px solid rgba(224,92,92,.3);color:#e05c5c;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px}
.add-btn{background:rgba(201,168,76,.08);border:1px dashed rgba(201,168,76,.4);border-radius:8px;padding:9px;color:#c9a84c;cursor:pointer;width:100%;font-size:12px;font-weight:700;margin-top:4px}
.ai-card{background:rgba(46,117,182,.06);border:1px solid rgba(46,117,182,.2);border-radius:10px;padding:16px}
.ai-lbl{font-size:11px;color:#4a90d9;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.ai-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:8px 11px;color:#f0ece3;font-size:12px;font-family:inherit;resize:vertical;outline:none}
.ai-inp:focus{border-color:#4a90d9}
.ai-res{display:none;margin-top:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.prev-box{display:none;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:16px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:450px;overflow-y:auto}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:9px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.btn-g{background:#c9a84c;color:#0f1923}
.btn-g:hover{background:#e0b94f}
.btn-ai{background:rgba(46,117,182,.2);color:#4a90d9;border:1px solid rgba(46,117,182,.4)}
.btn-dl{background:rgba(76,175,130,.15);color:#4caf82;border:1px solid rgba(76,175,130,.35)}
.btn-dl:disabled{opacity:.4;cursor:not-allowed}
.toast{position:fixed;bottom:20px;right:20px;background:#1a2535;border:1px solid #c9a84c;border-radius:9px;padding:11px 18px;font-size:12px;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:700px){.layout{flex-direction:column}.sidebar{width:100%;flex-direction:row;flex-wrap:wrap;gap:6px}.g{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">Gerador de Documentos</div>
    <div class="hdr-sub">Procuradoria-Geral do Município de Extrema — MG</div>
  </div>
  <a class="hdr-back" href="javascript:window.close()">← Fechar</a>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="slbl">Tipo de Documento</div>
    <button class="sbtn on" id="sb-nom" onclick="sel('nom')">
      <div class="sbtn-n">Portaria de Nomeação</div>
      <div class="sbtn-d">Cargo em comissão</div>
    </button>
    <button class="sbtn" id="sb-exo" onclick="sel('exo')">
      <div class="sbtn-n">Portaria de Exoneração</div>
      <div class="sbtn-d">Cargo efetivo / comissão</div>
    </button>
    <button class="sbtn" id="sb-pae" onclick="sel('pae')">
      <div class="sbtn-n">Portaria de PAE</div>
      <div class="sbtn-d">Processo Administrativo</div>
    </button>
    <button class="sbtn" id="sb-dec" onclick="sel('dec')">
      <div class="sbtn-n">Decreto</div>
      <div class="sbtn-d">Decreto municipal</div>
    </button>
    <button class="sbtn" id="sb-pro" onclick="sel('pro')">
      <div class="sbtn-n">Procuração Ad Judicia</div>
      <div class="sbtn-d">Representação judicial</div>
    </button>
    <button class="sbtn" id="sb-ofi" onclick="sel('ofi')">
      <div class="sbtn-n">Ofício</div>
      <div class="sbtn-d">Correspondência oficial</div>
    </button>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-t" id="form-title">Portaria de Nomeação</div>
      <div id="form-area"></div>
    </div>

    <div class="ai-card">
      <div class="ai-lbl">🤖 Revisão por IA (opcional)</div>
      <textarea class="ai-inp" id="ai-inp" rows="3" placeholder="Ex: Adicione um considerando sobre a CI nº 28/2026. Altere a data de efeito do inciso I para 15/04/2026..."></textarea>
      <div class="ai-res" id="ai-res"></div>
      <div style="margin-top:8px">
        <button class="btn btn-ai" onclick="doAI()">🤖 Aplicar revisão por IA</button>
      </div>
    </div>

    <div class="card">
      <div class="card-t">Preview e Download</div>
      <div class="btn-row">
        <button class="btn btn-g" onclick="doPreview()">👁 Gerar Preview</button>
        <button class="btn btn-dl" id="dl-btn" onclick="doDownload()" disabled>📥 Baixar .docx</button>
      </div>
      <div class="prev-box" id="prev-box"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var curDoc = 'nom';
var prevText = '';
var aiText = '';
var srvN = 0;
var ROMS = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

function ntf(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function fld(lbl,inp,full){
  return '<div class="fl'+(full?' gf':'')+' " style="margin-bottom:0">'+
    '<label>'+lbl+'</label>'+inp+'</div>';
}

function row2(a,b){ return '<div class="g" style="margin-bottom:10px">'+a+b+'</div>'; }
function row1(a){ return '<div class="g gf" style="margin-bottom:10px">'+a+'</div>'; }

function today(){ return new Date().toISOString().split('T')[0]; }

function datePT(iso){
  if(!iso) return '';
  var p=iso.split('-');
  var m=['','janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return parseInt(p[2])+' de '+m[parseInt(p[1])]+' de '+p[0];
}

function gv(id){ var e=document.getElementById(id); return e?e.value.trim():''; }

var FORMS = {
nom: function(){
  return row2(
    fld('Número da Portaria','<input id="_fn" type="number" placeholder="317">'),
    fld('Data','<input id="_fd" type="date" value="'+today()+'">')
  )+row1(fld('Ementa','<input id="_fe" value="Dispõe sobre a nomeação de servidores para cargos de provimento em comissão no âmbito da Administração Pública Municipal.">',true))+
  row1(fld('Considerandos (um por linha)','<textarea id="_fc" rows="3" placeholder="Ex: a Comunicação Interna nº 28/2026, oriunda da Secretaria de Meio Ambiente..."></textarea>',true))+
  '<div style="margin-top:4px"><div style="font-size:10px;text-transform:uppercase;color:rgba(255,255,255,.35);font-weight:700;margin-bottom:8px">Servidores Nomeados</div>'+
  '<div id="srvs"></div>'+
  '<button class="add-btn" onclick="addSrv()">+ Adicionar Servidor</button></div>';
},
exo: function(){
  return row2(
    fld('Número da Portaria','<input id="_fn" type="number" placeholder="319">'),
    fld('Data','<input id="_fd" type="date" value="'+today()+'">')
  )+row1(fld('Ementa','<input id="_fe" value="Dispõe sobre a exoneração de servidores no âmbito da Administração Pública Municipal, e dá outras providências.">',true))+
  row1(fld('Considerandos (um por linha)','<textarea id="_fc" rows="3" placeholder="Ex: os Ofícios nº 142/2026 e 143/2026, encaminhados pela Secretaria Municipal de Planejamento e Finanças..."></textarea>',true))+
  '<div style="margin-top:4px"><div style="font-size:10px;text-transform:uppercase;color:rgba(255,255,255,.35);font-weight:700;margin-bottom:8px">Servidores Exonerados</div>'+
  '<div id="srvs"></div>'+
  '<button class="add-btn" onclick="addSrv()">+ Adicionar Servidor</button></div>';
},
pae: function(){
  return row2(
    fld('Número da Portaria','<input id="_fn" type="number" placeholder="318">'),
    fld('Data','<input id="_fd" type="date" value="'+today()+'">')
  )+row1(fld('Ementa','<input id="_fe" value="Determina a instauração de Processo Administrativo Especial para apuração de fatos e responsabilidades, e dá outras providências.">',true))+
  row2(
    fld('Nº Boletim de Ocorrência','<input id="_fbo" placeholder="Ex: 2026-013584712-001">'),
    fld('Secretaria Envolvida','<input id="_fsec" placeholder="Ex: Secretaria Municipal de Obras">')
  )+row1(fld('Descrição do Fato (Art. 1º)','<textarea id="_ffato" rows="4" placeholder="Descreva o fato, o local e o dano causado..."></textarea>',true))+
  row1(fld('Considerandos Adicionais (um por linha)','<textarea id="_fc" rows="3"></textarea>',true));
},
dec: function(){
  return row2(
    fld('Número do Decreto','<input id="_fn" placeholder="Ex: 5.104">'),
    fld('Data','<input id="_fd" type="date" value="'+today()+'">')
  )+row1(fld('Ementa','<input id="_fe" placeholder='Ex: "Institui a Política Municipal de X..."'>',true))+
  row1(fld('Considerandos (um por linha)','<textarea id="_fc" rows="4" placeholder="Ex: o ofício nº 199/2026, proveniente da Secretaria Municipal de Educação;
o disposto na Lei nº 9.394/1996..."></textarea>',true))+
  row1(fld('Artigos do Decreto','<textarea id="_farts" rows="6" placeholder="Art. 1º – ...
Art. 2º – ...
Art. 3º – Este Decreto entra em vigor na data de sua publicação."></textarea>',true));
},
pro: function(){
  return row2(
    fld('Data','<input id="_fd" type="date" value="'+today()+'">'),
    fld('Número do Processo','<input id="_fproc" placeholder="Ex: 5005562-17.2025.8.13.0251">')
  )+row1(fld('Vara / Juízo','<input id="_fvara" placeholder="Ex: 2ª VARA CÍVEL, CRIMINAL E DA INFÂNCIA E DA JUVENTUDE DA COMARCA DE EXTREMA/MG">',true))+
  row1(fld('Parte Contrária','<input id="_fparte" placeholder="Ex: COMPANHIA DE SANEAMENTO DE MINAS GERAIS – COPASA MG">',true))+
  row1(fld('Advogados Constituídos (um por linha — Nome, OAB)','<textarea id="_fadvs" rows="5">Bruno Bertolotti, Procurador Geral do Município, OAB/MG 206.199
Natanael Jairo Cazzo, OAB/MG 140.842
Lucas Mendes Clemonte, OAB/MG 186.907
Felipe José Faria do Nascimento, OAB/MG 221.039
Mayara Cardoso de Oliveira, OAB/MG 231.355</textarea>',true));
},
ofi: function(){
  return row2(
    fld('Número do Ofício','<input id="_fn" placeholder="Ex: 138/2026">'),
    fld('Data','<input id="_fd" type="date" value="'+today()+'">')
  )+row1(fld('Destinatário','<input id="_fdest" placeholder="Ex: Ilmo. Sr. Secretário Municipal de Educação">',true))+
  row1(fld('Assunto','<input id="_fassunto" placeholder="Ex: Solicitação de informações sobre...">',true))+
  row1(fld('Corpo do Ofício','<textarea id="_fcorpo" rows="8" placeholder="Texto do ofício..."></textarea>',true));
}
};

function sel(t){
  curDoc=t; prevText=''; aiText=''; srvN=0;
  var titles={nom:'Portaria de Nomeação',exo:'Portaria de Exoneração',pae:'Portaria de PAE',dec:'Decreto',pro:'Procuração Ad Judicia',ofi:'Ofício'};
  document.getElementById('form-title').textContent=titles[t];
  document.getElementById('form-area').innerHTML=FORMS[t]();
  document.getElementById('prev-box').style.display='none';
  document.getElementById('dl-btn').disabled=true;
  document.getElementById('ai-res').style.display='none';
  document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('sb-'+t).classList.add('on');
  if(t==='nom'||t==='exo') addSrv();
}

function addSrv(){
  var c=document.getElementById('srvs'); if(!c) return;
  srvN++;
  var n=srvN;
  var idx=ROMS[c.children.length]||'?';
  var d=document.createElement('div');
  d.className='srv'; d.id='s'+n;
  var rm='<button class="srv-rm" onclick="document.getElementById('s'+n+'').remove()">✕</button>';
  if(curDoc==='nom'){
    d.innerHTML='<div class="srv-t">'+idx+' – Servidor</div>'+rm+
      row1(fld('Nome Completo (em maiúsculas)','<input class="sN" placeholder="Ex: DANIELA MORAIS BARROS">',true))+
      row2(fld('CPF (mascarado)','<input class="sC" placeholder="Ex: ***.356.94*-**">'),fld('Função / Cargo','<input class="sF" placeholder="Ex: Chefe de Divisão">'))+ 
      row1(fld('Secretaria','<input class="sS" placeholder="Ex: Secretaria Municipal de Meio Ambiente">',true))+
      row2(fld('Data de Efeito','<input class="sE" type="date">'),fld('','<span></span>'));
  }else{
    d.innerHTML='<div class="srv-t">'+idx+' – Servidor</div>'+rm+
      row1(fld('Nome Completo (em maiúsculas)','<input class="sN" placeholder="Ex: ANDRE APARECIDO BORGES">',true))+
      row2(
        fld('Tipo','<select class="sT"><option value="cargo efetivo">Cargo Efetivo</option><option value="cargo em comissão">Cargo em Comissão</option><option value="função de confiança">Função de Confiança</option></select>'),
        fld('A pedido?','<select class="sP"><option value="sim">Sim</option><option value="nao">Não</option></select>')
      )+
      row2(fld('Cargo / Função','<input class="sF" placeholder="Ex: Agente da Dengue">'),fld('Data de Efeito','<input class="sE" type="date">'))+ 
      row1(fld('Secretaria','<input class="sS" placeholder="Ex: Secretaria Municipal de Saúde">',true));
  }
  c.appendChild(d);
}

function buildText(){
  var t=curDoc;
  var num=gv('_fn'), dt=datePT(gv('_fd')), em=gv('_fe'), co=gv('_fc');
  var conds=co?co.split('
').filter(function(l){return l.trim();}).map(function(l){return'CONSIDERANDO '+l.trim();}).join('

'):'CONSIDERANDO a solicitação formulada pela Administração Municipal;';
  var pref='

O PREFEITO DO MUNICÍPIO DE EXTREMA, Senhor Fabrício Sanchez Bergamin, no uso de suas atribuições legais,';
  var ass='

Fabrício Sanchez Bergamin
- Prefeito Municipal -';

  if(t==='nom'){
    var rows=Array.from(document.querySelectorAll('#srvs .srv')).map(function(r,i){
      var nm=r.querySelector('.sN').value.trim();
      var cpf=r.querySelector('.sC').value.trim();
      var fn=r.querySelector('.sF').value.trim();
      var sec=r.querySelector('.sS').value.trim();
      var ef=r.querySelector('.sE').value?datePT(r.querySelector('.sE').value):'';
      return ROMS[i]+' – '+nm+', inscrit'+(nm.slice(-1)==='A'?'a':'o')+' no CPF nº '+cpf+', para exercer a função de '+fn+', vinculad'+(fn.toLowerCase().includes('coordenador')||fn.toLowerCase().includes('supervisora')?'a':'o')+' à '+sec+', com efeitos a partir de '+ef+';';
    }).join('

');
    return 'PORTARIA Nº. '+num+'
DE '+dt.toUpperCase()+'.

"'+em+'"

'+conds+pref+'

DETERMINA:

Art. 1º – Ficam nomeados para os cargos em comissão os seguintes servidores:

'+rows+'

Art. 2º – Esta Portaria entra em vigor na data de sua publicação, produzindo efeitos nas datas específicas indicadas em cada dispositivo, ficando revogadas as disposições em contrário.'+ass;
  }
  if(t==='exo'){
    var rows2=Array.from(document.querySelectorAll('#srvs .srv')).map(function(r,i){
      var nm=r.querySelector('.sN').value.trim();
      var fn=r.querySelector('.sF').value.trim();
      var sec=r.querySelector('.sS').value.trim();
      var ped=r.querySelector('.sP');
      var pedStr=ped&&ped.value==='sim'?', a pedido,':'';
      var ef=r.querySelector('.sE').value?datePT(r.querySelector('.sE').value):'';
      return ROMS[i]+' – '+nm+pedStr+', do cargo de '+fn+', lotad'+(nm.slice(-1)==='A'?'a':'o')+' na '+sec+', com efeitos a partir de '+ef+';';
    }).join('

');
    return 'PORTARIA Nº. '+num+'
DE '+dt.toUpperCase()+'.

"'+em+'"

'+conds+pref+'

DETERMINA:

Art. 1º – Ficam exonerados os seguintes servidores:

'+rows2+'

Art. 2º – Esta Portaria entra em vigor na data de sua publicação, produzindo efeitos nas datas especificadas em cada dispositivo, revogadas as disposições em contrário.'+ass;
  }
  if(t==='pae'){
    var bo=gv('_fbo'),sec=gv('_fsec'),fato=gv('_ffato');
    var boLine=bo?'

CONSIDERANDO o Boletim de Ocorrência nº '+bo+';':'';
    var extra=co?'

'+conds:'';
    return 'PORTARIA Nº. '+num+'
DE '+dt.toUpperCase()+'.

"'+em+'"

CONSIDERANDO o relato circunstanciado da ocorrência envolvendo servidor municipal, lotado na '+sec+';'+boLine+'

CONSIDERANDO que os fatos demandam apuração quanto às circunstâncias e à eventual responsabilidade dos envolvidos;

CONSIDERANDO a necessidade de assegurar o devido processo legal, a ampla defesa e o contraditório, em estrita observância aos princípios constitucionais que regem a Administração Pública;'+extra+pref+'

DETERMINA:

Art. 1º – Fica instaurado Processo Administrativo Especial – PAE, com a finalidade de apurar os fatos, as circunstâncias e as eventuais responsabilidades administrativas decorrentes de '+fato+'

§ 1º – A condução do presente PAE ficará a cargo da Procuradoria Geral do Município, nos termos da Lei Complementar Municipal nº 126/2017.

§ 2º – Na condução do processo, deverão ser rigorosamente observados os preceitos constitucionais do contraditório e da ampla defesa.

Art. 2º – Revogadas as disposições em contrário, esta Portaria entra em vigor na data de sua publicação.

Fabrício Sanchez Bergamin
Prefeito Municipal';
  }
  if(t==='dec'){
    var arts=gv('_farts')||'Art. 1º – ...

Art. 2º – Este Decreto entra em vigor na data de sua publicação.';
    return 'DECRETO Nº. '+num+'
DE '+dt.toUpperCase()+'.

"'+em+'"

'+conds+pref+'

DECRETA:

'+arts+ass;
  }
  if(t==='pro'){
    var proc=gv('_fproc'),parte=gv('_fparte'),vara=gv('_fvara');
    var advs=gv('_fadvs').split('
').filter(function(l){return l.trim();}).join('; ');

async function doAI(){
  var prompt=document.getElementById('ai-inp').value.trim();
  if(!prompt){ntf('Descreva o que a IA deve ajustar.');return;}
  var base=prevText||buildText();
  if(!base){doPreview();return;}
  ntf('Consultando IA...');
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
        system:'Você é um assistente jurídico especializado em documentos oficiais da Prefeitura de Extrema - MG. Retorne SOMENTE o documento completo revisado, sem explicações, sem comentários, sem markdown. Mantenha o estilo formal e as fórmulas padrão do documento original.',
        messages:[{role:'user',content:'Documento atual:

'+base+'

---
Ajuste solicitado: '+prompt}]})
    });
    var d=await r.json();
    var res=d.content&&d.content[0]&&d.content[0].text;
    if(!res) throw new Error('Sem resposta da IA');
    aiText=res; prevText=res;
    var el=document.getElementById('ai-res');
    el.textContent=res; el.style.display='block';
    doPreview();
    ntf('Revisão aplicada pela IA!');
  }catch(e){ntf('Erro IA: '+e.message);}
}

async function doDownload(){
  if(!prevText){ntf('Gere o preview primeiro.');return;}
  var D=docx,AT=D.AlignmentType;
  var lines=prevText.split('
');
  var children=[];
  function par(text,opts){
    opts=opts||{};
    return new D.Paragraph({
      alignment:opts.al||AT.JUSTIFIED,
      spacing:{after:opts.after||130},
      indent:opts.fi?{firstLine:opts.fi}:opts.li?{left:opts.li}:{},
      children:[new D.TextRun({text:text,font:'Arial',size:22,bold:!!opts.bold,italics:!!opts.it})]
    });
  }
  for(var i=0;i<lines.length;i++){
    var l=lines[i].trim();
    if(!l){children.push(new D.Paragraph({children:[new D.TextRun('')],spacing:{after:0}}));continue;}
    if(i<3&&/^(PORTARIA|DECRETO|PROCURA|OFÍCIO)/i.test(l)){children.push(par(l,{al:AT.CENTER,bold:true,after:80}));continue;}
    if(i<5&&/^DE d/.test(l)){children.push(par(l,{al:AT.CENTER,bold:true,after:160}));continue;}
    if(l.startsWith('"')&&l.endsWith('"')){children.push(par(l,{al:AT.JUSTIFIED,bold:true,it:true,fi:2880,after:200}));continue;}
    if(/^CONSIDERANDO/.test(l)){
      children.push(new D.Paragraph({alignment:AT.JUSTIFIED,spacing:{after:160},indent:{firstLine:720},
        children:[new D.TextRun({text:'CONSIDERANDO',bold:true,font:'Arial',size:22}),
                  new D.TextRun({text:l.replace('CONSIDERANDO',''),font:'Arial',size:22})]}));
      continue;
    }
    if(/^(O PREFEITO|DETERMINA:|DECRETA:)/.test(l)){children.push(par(l,{al:AT.CENTER,bold:true,after:160}));continue;}
    if(/^(Art.|§|CAPÍTULO)/.test(l)){children.push(par(l,{fi:720,after:120}));continue;}
    if(/^(I{1,3}V?|VI{0,3}|IX|X) [–-]/.test(l)){children.push(par(l,{fi:1440,after:120}));continue;}
    if(/^(Fabrício|Bruno|- Prefeito|Prefeito)/.test(l)){children.push(par(l,{al:AT.CENTER,bold:/^(Fabrício|Bruno)/.test(l),after:40}));continue;}
    children.push(par(l,{fi:720,after:130}));
  }
  var doc=new D.Document({
    styles:{default:{document:{run:{font:'Arial',size:22}}}},
    sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:1440,right:1440,bottom:1440,left:1701}}},children:children}]
  });
  var buf=await D.Packer.toBuffer(doc);
  var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='PGM_'+curDoc+'_Extrema.docx'; a.click();
  URL.revokeObjectURL(url);
  ntf('Download iniciado!');
}

async function upDoc(file, refId, refTipo) {
  if(!file) return null;
  const ext = file.name.split('.').pop();
  const path = refTipo+'/'+refId+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9.-]/g,'_');
  // Upload to storage
  const fd = new FormData(); fd.append('',file);
  const r = await fetch(SBU+'/storage/v1/object/documentos/'+path,{
    method:'POST', headers:{'apikey':SBK,'Authorization':'Bearer '+SBK},
    body: file
  });
  if(!r.ok) { const e=await r.text(); console.error('Upload err:',e); ntf('Erro no upload: '+r.status,'#e05c5c'); return null; }
  const url = SBU+'/storage/v1/object/public/documentos/'+path;
  // Save to documentos table
  await SB.from('documentos').insert({
    nome: file.name, url: url, tamanho: file.size,
    tipo: file.type, referencia_id: refId, referencia_tipo: refTipo,
    criado_por: S&&S.d&&S.d.nome
  });
  return url;
}

async function handleUpload(inputId, refId, refTipo, listId) {
  const inp = document.getElementById(inputId);
  if(!inp || !inp.files || !inp.files.length) return;
  const area = inp.closest('.upload-area');
  if(area) area.classList.add('uploading');
  ntf('Enviando arquivo...');
  for(const file of inp.files) {
    await upDoc(file, refId, refTipo);
  }
  ntf('Arquivo enviado!', '#4caf82');
  if(area) area.classList.remove('uploading');
  if(listId) await loadDocs(refId, refTipo, listId);
}

async function delDoc(docId, refId, refTipo, containerId) {
  if(!confirm('Remover este anexo?')) return;
  await SB.from('documentos').delete().eq('id', docId);
  ntf('Anexo removido');
  await loadDocs(refId, refTipo, containerId);
}

function uploadWidget(refId, refTipo, inputSuffix) {

  // Load docs after widget renders

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGM Extrema - Sistema de Gestao Juridica</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1b2a;color:#f0ece3;min-height:100vh}
:root{--gold:#c9a84c;--card:#1e2d40;--panel:#162032;--red:#e05c5c;--green:#4caf82;--blue:#4a90d9;--gray:#8a9bb0}
.hidden{display:none!important}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d1b2a,#1a2f45)}
.login-box{background:#162032;border:1px solid rgba(201,168,76,0.3);border-radius:16px;padding:40px;width:380px;max-width:95vw}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;line-height:1.6}
.login-logo p{font-size:11px;color:var(--gray);margin-top:6px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#f0ece3;font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.fg select option{background:#162032}
.btn-login{width:100%;padding:12px;background:var(--gold);color:#0d1b2a;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.err{color:#e05c5c;font-size:12px;text-align:center;margin-top:10px}
#app,#portal{display:flex;min-height:100vh}
.sb{width:220px;background:var(--panel);border-right:1px solid rgba(201,168,76,0.15);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
#ct,#sc{margin-left:220px;flex:1;overflow:auto}
.sh{padding:18px 20px 14px;border-bottom:1px solid rgba(201,168,76,0.12)}
.sl{color:var(--gold);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;line-height:1.5}
.ss{color:var(--gray);font-size:10px;margin-top:3px}
.ni{display:flex;align-items:center;gap:9px;width:100%;padding:10px 20px;background:transparent;border:none;border-left:3px solid transparent;color:var(--gray);cursor:pointer;font-size:12px;font-family:inherit;text-align:left}
.ni:hover{background:rgba(255,255,255,0.03);color:#f0ece3}
.ni.active{background:rgba(201,168,76,0.12);border-left-color:var(--gold);color:var(--gold);font-weight:600}
.nb{background:#e05c5c;color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:auto}
.sf{padding:14px 20px;border-top:1px solid rgba(201,168,76,0.1);margin-top:auto}
.ui{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.un{font-size:11px;font-weight:600}
.ur{font-size:10px;color:var(--gray)}
.lo{width:100%;padding:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--gray);border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit}
.tb{padding:16px 28px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;background:rgba(13,27,42,0.95);position:sticky;top:0;z-index:10}
.tb h2{font-size:18px}
.tb p{font-size:11px;color:var(--gray);margin-top:2px}
.btn{padding:8px 18px;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;border:none}
.bp{background:var(--gold);color:#0d1b2a}
.bs{background:rgba(255,255,255,0.06);color:var(--gray);border:1px solid rgba(255,255,255,0.1)!important}
.bsm{padding:4px 10px;font-size:11px;border-radius:5px;cursor:pointer;font-family:inherit;border:none;font-weight:500}
.pb{padding:22px 28px}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.sc2{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 18px;cursor:pointer}
.sl2{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.sv{font-size:28px;font-weight:700}
.tw{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.er{text-align:center;padding:40px!important;color:var(--gray)}
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tbb{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:18px;overflow-x:auto}
.tab{padding:9px 14px;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.pc{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 20px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center}
.md{background:#162032;border:1px solid rgba(201,168,76,0.25);border-radius:14px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mh{padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:16px}
.mc{background:none;border:none;cursor:pointer;color:var(--gray);font-size:22px;line-height:1}
.mb{padding:20px 22px}
.mf{padding:14px 22px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:10px;justify-content:flex-end}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.fi input,.fi select,.fi textarea{width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#f0ece3;font-size:12px;font-family:inherit;outline:none}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--gold)}
.fi select option{background:#162032}
.fi textarea{resize:vertical}
#nf{position:fixed;top:18px;right:18px;z-index:500;background:#162032;border:1px solid var(--gold);border-radius:10px;padding:12px 18px;font-size:13px;box-shadow:0 4px 24px rgba(0,0,0,0.4);pointer-events:none}
#ld{position:fixed;inset:0;background:#0d1b2a;display:flex;align-items:center;justify-content:center;z-index:999}
.sp{width:36px;height:36px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div></div>
<div id="login-screen" class="hidden">
  <div class="login-box">
    <div class="login-logo">
      <h1>Procuradoria-Geral<br>do Municipio de Extrema</h1>
      <p>Sistema de Gestao Juridica - MG</p>
    </div>
    <div class="fg"><label>Tipo de acesso</label>
      <select id="lt" onchange="tT()">
        <option value="pgm">Procuradoria (PGM)</option>
        <option value="sec">Portal das Secretarias</option>
      </select>
    </div>
    <div class="fg"><label>E-mail</label><input type="email" id="le" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')dL()"></div>
    <div class="fg"><label>Senha</label><input type="password" id="ls" placeholder="..." onkeydown="if(event.key==='Enter')dL()"></div>
    <div class="fg hidden" id="sf2"><label>Secretaria</label>
      <select id="lse">
        <option value="">Selecione...</option>
        <option value="SADM">SADM - Administracao</option><option value="SOAS">SOAS - Assistencia Social</option>
        <option value="SAGR">SAGR - Agricultura</option><option value="SCOM">SCOM - Comunicacao</option>
        <option value="CGM">CGM - Controladoria</option><option value="SCULT">SCULT - Cultura</option>
        <option value="SEDU">SEDU - Educacao</option><option value="SELJ">SELJ - Esporte e Lazer</option>
        <option value="GAB">GAB - Gabinete</option><option value="SHAB">SHAB - Habitacao</option>
        <option value="SMIC">SMIC - Industria e Comercio</option><option value="SMAM">SMAM - Meio Ambiente</option>
        <option value="SOBR">SOBR - Obras</option><option value="SPOF">SPOF - Policia de Fronteiras</option>
        <option value="SRH">SRH - Recursos Humanos</option><option value="SRG">SRG - Regulacao</option>
        <option value="SSAU">SSAU - Saude</option><option value="SLIC">SLIC - Licitacoes</option>
        <option value="STUR">STUR - Turismo</option>
      </select>
    </div>
    <button class="btn-login" onclick="dL()">Entrar</button>
    <div id="le2" class="err"></div>
  </div>
</div>
<div id="app" class="hidden">
  <div class="sb">
    <div class="sh"><div class="sl">PGM Extrema</div><div class="ss">Procuradoria-Geral<br>Extrema - MG</div></div>
    <nav id="nm" style="flex:1;padding:10px 0;overflow-y:auto"></nav>
    <div class="sf"><div class="ui"><div class="av" id="ua"></div><div><div class="un" id="un"></div><div class="ur" id="ur"></div></div></div><button class="lo" onclick="dLo()">Sair</button></div>
  </div>
  <div id="ct"></div>
</div>
<div id="portal" class="hidden">
  <div class="sb">
    <div class="sh"><div class="sl" id="psi"></div><div class="ss">Portal da Secretaria<br>Extrema - MG</div></div>
    <nav style="flex:1;padding:10px 0">
      <button class="ni active" onclick="pV('l',event)">Minhas Solicitacoes</button>
      <button class="ni" onclick="pV('n',event)">Nova Solicitacao</button>
    </nav>
    <div class="sf"><div class="ui"><div class="av" id="pa" style="background:#4a90d9"></div><div><div class="un" id="pn"></div><div class="ur">Secretaria</div></div></div><button class="lo" onclick="dLo()">Sair</button></div>
  </div>
  <div id="sc"></div>
</div>
<div id="nf" class="hidden"></div>
<script>
const{createClient}=supabase;
const SB=createClient('https://ugioavmdfzajsarvlbtf.supabase.co','sb_publishable_G2P6G2eHLqix33TomxNWCA_9JyUuc8C');
let S=null,D={p:[],d:[],u:[],j:[],l:[],c:[],pr:[],o:[],pae:[],pl:[]},V='dash';
const fd=d=>{if(!d)return'-';const[y,m,da]=(d.split('T')[0]).split('-');return da+'/'+m+'/'+y};
const dl=d=>{if(!d)return null;return Math.ceil((new Date(d.split('T')[0])-new Date(new Date().toISOString().split('T')[0]))/86400000)};
const fc=v=>{if(!v)return'-';return'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2})};
const ii=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const CL=['#e05c5c','#4caf82','#4a90d9','#c9a84c','#9b59b6','#e09440','#1abc9c'];
const gc=n=>{let h=0;for(let c of(n||'?'))h=(h*31+c.charCodeAt(0))%CL.length;return CL[h]};
const bg=(s,m)=>{const[c,l]=m[s]||['#8a9bb0',s||'-'];return'<span class="bdg" style="background:'+c+'22;color:'+c+'">'+l+'</span>'};
function nt(msg,c='#c9a84c'){const e=document.getElementById('nf');e.textContent=msg;e.style.borderColor=c;e.classList.remove('hidden');clearTimeout(window._t);window._t=setTimeout(()=>e.classList.add('hidden'),3000)}
function md(h){let o=document.getElementById('_mo');if(!o){o=document.createElement('div');o.id='_mo';o.className='mo';document.body.appendChild(o)}o.innerHTML=h;o.classList.remove('hidden')}
function cm(){document.getElementById('_mo')?.classList.add('hidden')}
function sL(){document.getElementById('ld').classList.remove('hidden')}
function hL(){document.getElementById('ld').classList.add('hidden')}
function tT(){const t=document.getElementById('lt').value;document.getElementById('sf2').classList.toggle('hidden',t!=='sec')}
async function dL(){
  const t=document.getElementById('lt').value,e=document.getElementById('le').value.trim(),s=document.getElementById('ls').value,er=document.getElementById('le2');
  er.textContent='';if(!e||!s){er.textContent='Preencha e-mail e senha.';return}
  sL();
  if(t==='pgm'){
    const{data,error}=await SB.from('usuarios_pgm').select('*').eq('email',e).single();
    if(error||!data){hL();er.textContent='Usuario nao encontrado.';return}
    if(data.senha!==s){hL();er.textContent='Senha incorreta.';return}
    S={t:'pgm',d:data};localStorage.setItem('_s',JSON.stringify(S));await sA();
  }else{
    const sig=document.getElementById('lse').value;
    if(!sig){hL();er.textContent='Selecione a secretaria.';return}
    const{data,error}=await SB.from('secretarias').select('*').eq('sigla',sig).single();
    if(error||!data){hL();er.textContent='Secretaria nao encontrada.';return}
    if(data.senha!==s){hL();er.textContent='Senha incorreta.';return}
    S={t:'sec',d:data};localStorage.setItem('_s',JSON.stringify(S));sP();
  }
}
function dLo(){S=null;localStorage.removeItem('_s');location.reload()}
async function lA(){
  const[p,d,u,j,l,c,pr,o,pae,pl]=await Promise.all([
    SB.from('protocolos').select('*,secretaria:secretarias(nome,sigla)').order('created_at',{ascending:false}),
    SB.from('demandas').select('*').order('created_at',{ascending:false}),
    SB.from('usuarios_pgm').select('*'),
    SB.from('processos_judiciais').select('*,responsavel:usuarios_pgm(nome)').order('created_at',{ascending:false}),
    SB.from('licitacoes').select('*').order('created_at',{ascending:false}),
    SB.from('contratos').select('*').order('created_at',{ascending:false}),
    SB.from('pareceres').select('*,emissor:usuarios_pgm(nome)').order('created_at',{ascending:false}),
    SB.from('oficios').select('*').order('created_at',{ascending:false}),
    SB.from('pae').select('*').order('created_at',{ascending:false}),
    SB.from('projetos_lei').select('*').order('created_at',{ascending:false}),
  ]);
  D={p:p.data||[],d:d.data||[],u:u.data||[],j:j.data||[],l:l.data||[],c:c.data||[],pr:pr.data||[],o:o.data||[],pae:pae.data||[],pl:pl.data||[]}
}
async function sA(){
  await lA();hL();
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const u=S.d;
  document.getElementById('un').textContent=u.nome||u.email;
  document.getElementById('ur').textContent=u.cargo||'PGM';
  const av=document.getElementById('ua');av.textContent=ii(u.nome||u.email);av.style.background=gc(u.nome);
  bN();nv('dash');
}
function bN(){
  const pp=D.p.filter(x=>x.status==='recebido'||x.status==='em_analise').length;
  const dv=D.d.filter(x=>{if(x.status==='concluida')return false;const r=dl(x.prazo);return r!==null&&r<0}).length;
  const items=[{id:'dash',l:'Dashboard'},{id:'prot',l:'Protocolos',b:pp},{id:'dem',l:'Demandas',b:dv},{id:'jud',l:'Processos Judiciais'},{id:'lic',l:'Licitacoes'},{id:'con',l:'Contratos'},{id:'par',l:'Pareceres'},{id:'ofi',l:'Oficios'},{id:'pae',l:'PAE'},{id:'prj',l:'Projetos de Lei'}];
  document.getElementById('nm').innerHTML=items.map(n=>'<button class="ni'+(V===n.id?' active':'')+'" onclick="nv(''+n.id+'')">'+n.l+(n.b?'<span class="nb">'+n.b+'</span>':'')+'</button>').join('');
}
function nv(v){V=v;bN();const c=document.getElementById('ct');
  if(v==='dash')rD(c);else if(v==='prot')rP(c,'todos');else if(v==='dem')rDm(c,'todas');else rT(v,c);
}
function rD(el){
  const st=[{l:'Protocolos Pendentes',v:D.p.filter(x=>x.status==='recebido'||x.status==='em_analise').length,c:'#c9a84c',vw:'prot'},{l:'Demandas Ativas',v:D.d.filter(x=>x.status!=='concluida').length,c:'#4a90d9',vw:'dem'},{l:'Judiciais Ativos',v:D.j.filter(x=>x.fase!=='encerrado').length,c:'#9b59b6',vw:'jud'},{l:'Contratos Vigentes',v:D.c.filter(x=>x.status==='vigente').length,c:'#4caf82',vw:'con'},{l:'Pareceres',v:D.pr.length,c:'#e09440',vw:'par'},{l:'Contratos Vencendo',v:D.c.filter(x=>{const r=dl(x.fim);return x.status==='vigente'&&r!==null&&r<=30}).length,c:'#e05c5c',vw:'con'}];
  el.innerHTML='<div class="tb"><div><h2>Painel de Controle</h2><p>'+new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'</p></div></div><div class="pb"><div class="sg">'+st.map(s=>'<div class="sc2" onclick="nv(''+s.vw+'')" style="border-top:3px solid '+s.c+'"><div class="sl2">'+s.l+'</div><div class="sv" style="color:'+s.c+'">'+s.v+'</div></div>').join('')+'</div><div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px"><div class="tw"><div style="padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center"><strong>Protocolos Recentes</strong><button class="btn bs" onclick="nv('prot')">Ver todos</button></div>'+(D.p.length===0?'<p class="er">Nenhum protocolo</p>':D.p.slice(0,6).map(p=>{const cx={recebido:'#c9a84c',em_analise:'#4a90d9',respondido:'#4caf82',arquivado:'#8a9bb0',em_andamento:'#e09440'}[p.status]||'#c9a84c';return'<div style="display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid rgba(255,255,255,0.04)"><div style="width:7px;height:7px;border-radius:50%;background:'+cx+';flex-shrink:0"></div><div><div style="font-size:12px;font-weight:500">'+(p.titulo||'').slice(0,40)+'</div><div style="font-size:10px;color:var(--gray)">'+(p.secretaria?.sigla||'')+' #'+(p.numero||'')+'</div></div></div>'}).join(''))+'</div><div class="tw"><div style="padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06)"><strong>Alertas de Prazo</strong></div>'+([...D.d.filter(x=>{if(x.status==='concluida')return false;const r=dl(x.prazo);return r!==null&&r<=3}).map(x=>({t:'Demanda',n:x.titulo,p:x.prazo,c:'#e05c5c'})),...D.c.filter(x=>{const r=dl(x.fim);return x.status==='vigente'&&r!==null&&r<=30}).map(x=>({t:'Contrato',n:x.fornecedor,p:x.fim,c:'#e09440'}))].sort((a,b)=>new Date(a.p)-new Date(b.p)).slice(0,6).map(a=>{const r=dl(a.p);return'<div style="display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid rgba(255,255,255,0.04)"><div style="width:7px;height:7px;border-radius:50%;background:'+a.c+';flex-shrink:0"></div><div style="flex:1"><div style="font-size:12px">'+(a.n||'').slice(0,28)+'</div><div style="font-size:10px;color:var(--gray)">'+a.t+'</div></div><div style="font-size:11px;font-weight:700;color:'+a.c+'">'+(r<0?Math.abs(r)+'d':r===0?'Hoje':r+'d')+'</div></div>'}).join('')||'<p class="er">Nenhum alerta</p>')+'</div></div></div>';
}
function rP(el,f){
  const sm={recebido:['#c9a84c','Recebido'],em_analise:['#4a90d9','Em Analise'],em_andamento:['#e09440','Em Andamento'],respondido:['#4caf82','Respondido'],arquivado:['#8a9bb0','Arquivado']};
  const lista=f==='todos'?D.p:D.p.filter(x=>x.status===f);
  const ct=s=>s==='todos'?D.p.length:D.p.filter(x=>x.status===s).length;
